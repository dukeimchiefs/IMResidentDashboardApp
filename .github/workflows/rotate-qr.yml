name: Rotate daily QR codes

on:
  schedule:
    # ~4-5am America/New_York year-round (UTC-5/UTC-4), safely after Eastern
    # midnight in both DST and standard time, well before any morning conference.
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      event_types:
        description: >-
          Space-separated event types to (re)generate, e.g. "welcome". Defaults
          to the normal daily pair. Useful for one-off regeneration of a static
          event (like welcome) with the correct QR_SECRET, since that secret
          can't be read back out to regenerate it locally by hand.
        required: false
        default: 'noon learning'

permissions:
  contents: write

jobs:
  rotate-qr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install qrcode[pil]
      # EVENT_TYPES goes through env, not a direct ${{ }} splice into the run
      # script — GitHub substitutes ${{ }} into the script text before the
      # shell parses it, so an input containing shell metacharacters would
      # execute as code. An env var is safely word-split by the shell but
      # never re-parsed for metacharacters.
      - run: python scripts/generate_qr.py $EVENT_TYPES
        env:
          QR_SECRET: ${{ secrets.QR_SECRET }}
          EVENT_TYPES: ${{ github.event.inputs.event_types || 'noon learning' }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: rotate daily QR codes'
          file_pattern: 'frontend/assets/qr/qr_*.png'
